<!doctype html>
<html lang="pt-BR">
<head>

  <meta name="viewport" content="width=1536, height=1024">
  <title>O Bebê Fusquinha e a Biblioteca Perdida das Perguntas</title>
  <style>
    @page {
      size: 1536px 1024px;
      margin: 0;
    }

    html,
    body {
      margin: 0;
      padding: 0;
      width: 1536px;
      background: #ffffff;
    }

    section.page {
      width: 1536px;
      height: 1024px;
      margin: 0;
      padding: 0;
      overflow: hidden;

      break-inside: avoid;

      break-after: page;
    }

    section.page:last-of-type {
      page-break-after: auto;
      break-after: auto;
    }

    section.page img {
      display: block;
      width: 1536px;
      height: 1024px;
      margin: 0;
      padding: 0;
      border: 0;
      object-fit: cover;
    }
  </style>
</head>

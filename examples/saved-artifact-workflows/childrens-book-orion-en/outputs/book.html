<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <title>Orion and the Hunt for His Spark</title>
  <style>
    @page {
      size: 1536px 1024px;
      margin: 0;
    }

    html,
    body {
      margin: 0;
      padding: 0;
      width: 1536px;
      background: #ffffff;
    }

    * {
      box-sizing: border-box;
    }

    section.page {
      width: 1536px;
      height: 1024px;
      margin: 0;
      padding: 0;
      overflow: hidden;
      page-break-before: always;
      page-break-after: always;
      page-break-inside: avoid;
      break-before: page;
      break-after: page;
      break-inside: avoid;
      position: relative;
    }

    section.page:first-of-type {
      page-break-before: auto;
      break-before: auto;
    }

    section.page img {
      width: 100%;
      height: 100%;
      display: block;
      object-fit: cover;
      margin: 0;
      padding: 0;
      border: 0;
    }

    section.cover {
      display: flex;
      align-items: center;
      justify-content: center;
      text-align: center;
      background:
        radial-gradient(circle at 30% 25%, rgba(255, 245, 190, 0.95) 0%, rgba(255, 245, 190, 0) 32%),
        radial-gradient(circle at 78% 68%, rgba(255, 178, 121, 0.6) 0%, rgba(255, 178, 121, 0) 34%),
        linear-gradient(135deg, #f8c46b 0%, #f3a65f 45%, #d97b69 100%);
      color: #3b2452;
      font-family: Georgia, "Times New Roman", serif;
    }

    section.cover h1 {
      margin: 0;
      padding: 0 160px;
      font-size: 96px;
      line-height: 1.08;
      font-weight: 700;
      letter-spacing: 1px;
      text-shadow: 0 6px 18px rgba(255, 255, 255, 0.35);
    }

    @media print {
      html,
      body {
        width: 1536px;
        height: auto;
      }

      section.page {
        width: 1536px;
        height: 1024px;
      }
    }
  </style>
</head>
<body>
  <section class="page cover">
    <h1>Orion and the Hunt for His Spark</h1>
  </section>

  <section class="page">
    <img src="pages/page-1.png" alt="">
  </section>

  <section class="page">
    <img src="pages/page-2.png" alt="">
  </section>

  <section class="page">
    <img src="pages/page-3.png" alt="">
  </section>

  <section class="page">
    <img src="pages/page-4.png" alt="">
  </section>

  <section class="page">
    <img src="pages/page-5.png" alt="">
  </section>

  <section class="page">
    <img src="pages/page-6.png" alt="">
  </section>

  <section class="page">
    <img src="pages/page-7.png" alt="">
  </section>

  <section class="page">
    <img src="pages/page-8.png" alt="">
  </section>

  <section class="page">
    <img src="pages/page-9.png" alt="">
  </section>

  <section class="page">
    <img src="pages/page-10.png" alt="">
  </section>

  <section class="page">
    <img src="pages/page-11.png" alt="">
  </section>

  <section class="page">
    <img src="pages/page-12.png" alt="">
  </section>
</body>
</html>

<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <title>Orion and the Hunt for His Spark</title>
  <style>
    @page {
      size: 1536px 1024px;
      margin: 0;
    }

    * {
      box-sizing: border-box;
    }

    html,
    body {
      margin: 0;
      padding: 0;
      width: 1536px;
      background: #ffffff;
    }

    section.page {
      width: 1536px;
      height: 1024px;
      margin: 0;
      padding: 0;
      overflow: hidden;
      position: relative;
      page-break-before: always;
      page-break-after: always;
      page-break-inside: avoid;
      break-before: page;
      break-after: page;
      break-inside: avoid;
    }

    section.page:first-of-type {
      page-break-before: auto;
      break-before: auto;
    }

    section.page img {
      display: block;
      width: 100%;
      height: 100%;
      object-fit: cover;
      margin: 0;
      padding: 0;
      border: 0;
    }

    section.cover {
      display: flex;
      align-items: center;
      justify-content: center;
      text-align: center;
      background:
        radial-gradient(circle at 50% 35%, rgba(255, 246, 199, 0.95) 0%, rgba(255, 214, 145, 0.9) 34%, rgba(233, 135, 91, 0.88) 68%, rgba(126, 73, 111, 0.96) 100%);
      color: #fff8dc;
      font-family: Georgia, "Times New Roman", serif;
    }

    .cover h1 {
      margin: 0;
      padding: 0 140px;
      font-size: 108px;
      line-height: 1.08;
      font-weight: 700;
      letter-spacing: 1px;
      text-shadow: 0 8px 24px rgba(75, 43, 69, 0.45);
    }

    @media screen {
      body {
        margin: 0 auto;
      }
    }
  </style>
</head>
<body>
  <section class="page cover">
    <h1>Orion and the Hunt for His Spark</h1>
  </section>

  <section class="page">
    <img src="pages/page-1.png" alt="">
  </section>

  <section class="page">
    <img src="pages/page-2.png" alt="">
  </section>

  <section class="page">
    <img src="pages/page-3.png" alt="">
  </section>

  <section class="page">
    <img src="pages/page-4.png" alt="">
  </section>

  <section class="page">
    <img src="pages/page-5.png" alt="">
  </section>

  <section class="page">
    <img src="pages/page-6.png" alt="">
  </section>

  <section class="page">
    <img src="pages/page-7.png" alt="">
  </section>

  <section class="page">
    <img src="pages/page-8.png" alt="">
  </section>

  <section class="page">
    <img src="pages/page-9.png" alt="">
  </section>

  <section class="page">
    <img src="pages/page-10.png" alt="">
  </section>

  <section class="page">
    <img src="pages/page-11.png" alt="">
  </section>

  <section class="page">
    <img src="pages/page-12.png" alt="">
  </section>
</body>
</html>

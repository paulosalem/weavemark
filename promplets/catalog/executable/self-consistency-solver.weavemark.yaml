# Self-Consistency Solver — Runtime Config

engine: self-consistency

engine_config:
  samples: 5
  aggregation: majority_vote
  temperature: 0.8

variables:
  problem: "A workshop sells 18 starter kits in week 1. Sales increase by 6 kits each week for 10 weeks total. Each kit generates $37 in profit before fixed costs, and the workshop pays a one-time $1,250 tooling cost. What is the total profit after 10 weeks?"

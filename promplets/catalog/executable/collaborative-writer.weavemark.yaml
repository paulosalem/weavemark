# Collaborative Writer — Runtime Config

engine: collaborative

engine_config:
  max_rounds: 4

prompts:
  generate:
    model: gpt-5.5
    temperature: 0.8
  continue:
    model: gpt-5.5
    temperature: 0.6

variables:
  format: "short essay"
  topic: "how small daily rituals make remote teams feel more human"
  tone: "warm, practical, and reflective"
  target_length: "700-900 words"

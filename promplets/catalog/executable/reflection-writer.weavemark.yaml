# Reflection Writer — Runtime Config

engine: reflection

engine_config:
  max_rounds: 4

prompts:
  generate:
    model: gpt-5.5
    temperature: 0.7
  critique:
    model: gpt-5.5
    temperature: 0.2
  revise:
    model: gpt-5.5
    temperature: 0.4

variables:
  topic: "How containerization (Docker) works and why developers use it"
  audience: "junior developers who have never used containers"
  length: "400-600 words"

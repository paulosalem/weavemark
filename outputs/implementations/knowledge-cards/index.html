<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
    <meta name="theme-color" content="#f5eadb">
    <meta
      name="description"
      content="Knowledge Cards turns a one-card feed into calm cumulative learning with local notes, progress, and offline reading."
    >
    <title>Knowledge Cards</title>
    <link rel="icon" href="./favicon.svg" type="image/svg+xml">
    <link rel="manifest" href="./manifest.webmanifest">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-title" content="Knowledge Cards">
    <link rel="stylesheet" href="./styles/site.css?v=1.1.1">
    <script type="module" src="./src/main.js?v=1.1.6"></script>
  </head>
  <body>
    <a class="skip-link" href="#app-main">Skip to content</a>
    <div id="app" class="app-shell">
      <main id="app-main" class="boot-panel" aria-live="polite">
        <p class="eyebrow">Knowledge Cards</p>
        <h1>Loading your learning library...</h1>
        <p>Static packs, local notes, and no engagement tracking.</p>
      </main>
    </div>
    <noscript>
      <section class="noscript-panel">
        <h1>Knowledge Cards needs JavaScript</h1>
        <p>This static app uses browser JavaScript to load checked-in packs and save your local notes.</p>
      </section>
    </noscript>
  </body>
</html>

name: Release

on:
  push:
    tags:
      - "v*.*.*"

permissions:
  contents: read

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: false

jobs:
  build:
    name: Validate and build
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Check out tagged source
        uses: actions/checkout@v5
        with:
          fetch-depth: 0
          lfs: false

      - name: Require a tag on main
        run: |
          git fetch --no-tags origin main
          git merge-base --is-ancestor "$GITHUB_SHA" origin/main

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.11"
          cache: pip

      - name: Install release dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install -e ".[dev,convert,ui]"
          python -m pip install build twine

      - name: Validate release contract
        run: |
          python scripts/check_release.py \
            --tag "$GITHUB_REF_NAME" \
            --notes release-notes.md

      - name: Run tests
        run: pytest -q

      - name: Check language and repository artifacts
        run: |
          python scripts/check_grammar_sync.py
          python scripts/check_markdown_hygiene.py
          python scripts/check_repository_hygiene.py

      - name: Build distributions
        run: python -m build

      - name: Validate distributions
        run: |
          python scripts/check_distribution_artifact.py dist/*
          twine check --strict dist/*

      - name: Upload release artifacts
        uses: actions/upload-artifact@v4
        with:
          name: release-artifacts
          path: |
            dist/*
            release-notes.md
          if-no-files-found: error
          retention-days: 7

  publish-pypi:
    name: Publish to PyPI
    needs: build
    runs-on: ubuntu-latest
    timeout-minutes: 10
    environment:
      name: pypi
      url: https://pypi.org/p/weavemark
    permissions:
      id-token: write

    steps:
      - name: Download release artifacts
        uses: actions/download-artifact@v5
        with:
          name: release-artifacts
          path: release-artifacts

      - name: Publish distributions with trusted publishing
        uses: pypa/gh-action-pypi-publish@release/v1
        with:
          packages-dir: release-artifacts/dist/

  github-release:
    name: Create GitHub release
    needs: publish-pypi
    runs-on: ubuntu-latest
    timeout-minutes: 10
    permissions:
      contents: write

    steps:
      - name: Download release artifacts
        uses: actions/download-artifact@v5
        with:
          name: release-artifacts
          path: release-artifacts

      - name: Create or update GitHub release
        env:
          GH_TOKEN: ${{ github.token }}
          GH_REPO: ${{ github.repository }}
        run: |
          if gh release view "$GITHUB_REF_NAME" >/dev/null 2>&1; then
            gh release upload "$GITHUB_REF_NAME" \
              release-artifacts/dist/* \
              --clobber
            gh release edit "$GITHUB_REF_NAME" --draft=false
          else
            gh release create "$GITHUB_REF_NAME" \
              release-artifacts/dist/* \
              --verify-tag \
              --title "WeaveMark ${GITHUB_REF_NAME#v}" \
              --notes-file release-artifacts/release-notes.md
          fi
